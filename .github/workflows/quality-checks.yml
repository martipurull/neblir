name: Quality checks

on:
  pull_request:
  push:
jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Placeholders only for compile + prisma generate — no runtime DB/access from CI.
      MONGODB_URI: mongodb://127.0.0.1:27017/ci-build
      AUTH_SECRET: ci-build-placeholder-secret-min-length-32
      AUTH_GOOGLE_ID: ci-build-placeholder
      AUTH_GOOGLE_SECRET: ci-build-placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run test:file
      - run: npm run build

      - name: Smoke test (production server boot)
        env:
          PORT: "3000"
          HOSTNAME: "127.0.0.1"
        run: |
          npm run start &
          SERVER_PID=$!
          cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          echo "Waiting for server..."
          for i in $(seq 1 45); do
            if curl -sf -o /dev/null --connect-timeout 2 "http://127.0.0.1:3000/signin"; then
              echo "Server ready after ${i} attempt(s)"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "Server did not become ready in time"
              exit 1
            fi
            sleep 2
          done

          bash scripts/smoke-http.sh "http://127.0.0.1:3000"
